<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miniburger TS</title>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      document.body.innerHTML += `<div style="color: red; padding: 20px; font-family: monospace; background: white; position: absolute; top: 0; left: 0; z-index: 9999;">
            <h1>Global Error</h1>
            <pre>${message}\n${source}:${lineno}:${colno}</pre>
        </div>`;
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app"></div>
  <div id="ui-layer">
    <div id="health-display" style="font-family: 'Press Start 2P', monospace; text-shadow: 2px 2px 0 #000;">❤️❤️❤️❤️❤️
    </div>
    <div id="xp-display"
      style="font-family: 'Press Start 2P', monospace; text-shadow: 2px 2px 0 #000; font-size: 14px; margin-top: 5px;">
      XP: 0/4</div>
    <div id="location-display"
      style="position: absolute; bottom: 20px; left: 20px; color: white; font-family: 'Press Start 2P', monospace; font-size: 16px; text-shadow: 2px 2px 0 #000;">
      Loading...</div>
    <div id="task-hud">LOADING TASKS...</div>
    <div id="pause-screen">PAUSE</div>
    <div id="death-screen">
      <div id="death-title">You Died</div>
      <div id="death-buttons">
        <button class="death-btn" id="btn-new-game">New Game</button>
        <button class="death-btn" id="btn-continue">Continue</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
