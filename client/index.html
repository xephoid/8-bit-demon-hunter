<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miniburger TS</title>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      document.body.innerHTML += `<div style="color: red; padding: 20px; font-family: monospace; background: white; position: absolute; top: 0; left: 0; z-index: 9999;">
            <h1>Global Error</h1>
            <pre>${message}\n${source}:${lineno}:${colno}</pre>
        </div>`;
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app"></div>
  <div id="ui-layer">
    <div id="health-display" style="font-family: 'Press Start 2P', monospace; text-shadow: 2px 2px 0 #000;">❤️❤️❤️
    </div>
    <div id="xp-display">XP: 0/4</div>
    <div id="location-display"
      style="position: absolute; bottom: 20px; left: 20px; color: white; font-family: 'Press Start 2P', monospace; font-size: 16px; text-shadow: 2px 2px 0 #000;">
      Loading...</div>
    <div id="task-hud">LOADING TASKS...</div>
    <div id="pause-screen">
      <div id="pause-title">PAUSE</div>
      <button id="pause-btn-resume">RESUME</button>
      <div id="pause-nav">
        <button class="pause-nav-btn active" id="pause-btn-settings">SETTINGS</button>
        <button class="pause-nav-btn" id="pause-btn-stats">STATS</button>
        <button class="pause-nav-btn" id="pause-btn-howto">HOW TO PLAY</button>
        <button class="pause-nav-btn" id="pause-btn-items">MAGIC ITEMS</button>
        <button class="pause-nav-btn" id="pause-btn-resources">RESOURCES</button>
      </div>
      <div id="pause-settings">
        <label for="sensitivity-slider">MOUSE SENSITIVITY</label>
        <div id="sensitivity-row">
          <input type="range" id="sensitivity-slider" min="0.2" max="2.0" step="0.1" value="1.0">
          <span id="sensitivity-value">1.0</span>
        </div>
        <label for="music-volume-slider">MUSIC</label>
        <div id="music-volume-row">
          <input type="range" id="music-volume-slider" min="0" max="1.0" step="0.05" value="1.0">
          <span id="music-volume-value">1.0</span>
        </div>
        <label for="sfx-volume-slider">SFX</label>
        <div id="sfx-volume-row">
          <input type="range" id="sfx-volume-slider" min="0" max="1.0" step="0.05" value="1.0">
          <span id="sfx-volume-value">1.0</span>
        </div>
      </div>
      <div id="pause-stats"></div>
      <div id="pause-howto"></div>
      <div id="pause-items"></div>
      <div id="pause-resources"></div>
    </div>
    <div id="cheat-overlay">
      <span id="cheat-prompt">&gt; </span><input type="text" id="cheat-input" autocomplete="off" spellcheck="false"
        placeholder="enter command..." />
      <div id="cheat-output"></div>
    </div>
    <div id="loading-screen">
      <div id="loading-title">Loading...</div>
    </div>
    <div id="death-screen">
      <div id="death-title">You Died</div>
      <div id="death-killer"></div>
      <div id="death-buttons">
        <button class="death-btn" id="btn-new-game">New Game</button>
        <button class="death-btn" id="btn-continue">Continue</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
